<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Browse refurbished phones, laptops, audio gear, and accessories with filters for brand, condition, color, and price."
    >
    <meta name="theme-color" content="#05031A">
    <meta name="robots" content="index,follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Refurbed Product Finder">
    <meta
        property="og:description"
        content="Browse refurbished phones, laptops, audio gear, and accessories with filters for brand, condition, color, and price."
    >
    <meta name="twitter:card" content="summary_large_image">
    <title>Refurbed Product Finder</title>
    <link rel="manifest" href="/site.webmanifest">
    <style>
        :root {
            background: #f9fafb;
            color: #0f172a;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f9fafb;
        }

        .app-shell {
            min-height: 100vh;
            padding: 16px;
        }

        .app-shell__frame {
            margin: 0 auto;
            max-width: 1360px;
        }

        .app-shell__toolbar {
            display: flex;
            gap: 12px;
        }

        .app-shell__search {
            flex: 1 1 auto;
            height: 70px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
        }

        .app-shell__filters {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: rgba(5, 3, 26, 0.08);
        }

        .app-shell__count {
            width: 168px;
            height: 14px;
            margin: 24px 0 0;
            border-radius: 999px;
            background: #dbe3ed;
        }

        .app-shell__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 40px;
        }

        .app-shell__card {
            aspect-ratio: 340 / 510;
            border-radius: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #f4f6f8 100%);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        @media (min-width: 640px) {
            .app-shell {
                padding: 24px;
            }

            .app-shell__count {
                margin-top: 32px;
            }
        }

        @media (min-width: 1024px) {
            .app-shell {
                padding: 32px 44px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-shell" aria-hidden="true">
            <div class="app-shell__frame">
                <div class="app-shell__toolbar">
                    <div class="app-shell__search"></div>
                    <div class="app-shell__filters"></div>
                </div>

                <div class="app-shell__count"></div>

                <div class="app-shell__grid">
                    <div class="app-shell__card"></div>
                    <div class="app-shell__card"></div>
                    <div class="app-shell__card"></div>
                </div>
            </div>
        </div>
    </div>
    <noscript>Please enable JavaScript to browse the Refurbed product catalog.</noscript>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
